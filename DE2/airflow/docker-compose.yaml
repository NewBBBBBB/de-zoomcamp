x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: my-speed-airflow:latest
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
    # GCP
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/sa-key.json
    GCP_PROJECT: ${GCP_PROJECT:-iron-figure-312018}
    GCS_BUCKET: ${GCS_BUCKET:-my-speed-lake-iron-figure-312018}
    BQ_RAW: ${BQ_RAW:-speed_raw}
    BQ_MARTS: ${BQ_MARTS:-speed_marts}
    BQ_LOCATION: ${BQ_LOCATION:-US}
    # dbt
    DBT_PROFILES_DIR: /opt/airflow/dbt
    PYTHONPATH: /opt/airflow/ingestion
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ../ingestion:/opt/airflow/ingestion
    - ../dbt:/opt/airflow/dbt
    - ../credentials:/opt/airflow/credentials:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin --password admin \
          --firstname A --lastname D --role Admin \
          --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
